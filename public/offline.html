<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Offline · Kingston Mosque</title>
    <style>
      :root { --green: #0b3d2e; --gold: #e8d59a; --cream: #faf7f0; }
      * { box-sizing: border-box; margin: 0; }
      body {
        font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
        min-height: 100vh;
        display: grid;
        place-items: center;
        text-align: center;
        padding: 24px;
        background: radial-gradient(circle at 50% -10%, #157f54, #0b3d2e 60%, #07271d);
        color: var(--cream);
      }
      .crescent { font-size: 56px; color: var(--gold); }
      h1 { font-size: 1.6rem; margin: 12px 0 8px; color: var(--gold); }
      p { opacity: 0.85; max-width: 28rem; line-height: 1.6; }
      button {
        margin-top: 20px;
        padding: 0.8em 1.6em;
        border: 0;
        border-radius: 999px;
        background: var(--gold);
        color: #2a2000;
        font-weight: 700;
        font-size: 1rem;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <main>
      <div class="crescent">☾</div>
      <h1>You're offline</h1>
      <p>
        Kingston Mosque needs a connection to show the latest prayer times and news.
        Please check your internet and try again.
      </p>
      <button onclick="location.reload()">Try again</button>
    </main>
  </body>
</html>
