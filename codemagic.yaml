# Codemagic CI — builds the Kingston Mosque mobile apps (mobile/) in the cloud.
# iOS is built on Codemagic's Macs, so no Mac is needed locally.
#
# One-time setup in the Codemagic dashboard (https://codemagic.io):
#   1. Add this repository as an application ("Other" → codemagic.yaml).
#   2. iOS release: Teams → Integrations → App Store Connect → add an API key
#      named "kma-appstore" (Users & Access → Integrations in App Store Connect).
#      Codemagic then creates/fetches the signing certificate + profile itself.
#   3. Android release: create an upload keystore once
#        keytool -genkey -v -keystore kma.keystore -alias kma -keyalg RSA -keysize 2048 -validity 10000
#      and upload it under Teams → Code signing identities → Android, referenced
#      below as "kma_keystore".
#   4. The "android-preview" workflow needs NO credentials — run it first to get
#      an installable APK for testing on any Android phone.

workflows:
  # ── Android test build — zero setup, installable .apk ─────────────────────
  android-preview:
    name: Android preview (APK, no signing setup)
    # mac_mini_m2 is the machine included in Codemagic's free plan (500 min/month);
    # Linux instances (linux_x2) need a paid billing plan. Android builds fine on macOS.
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: mobile
    environment:
      node: 20.18.1
      java: 17
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Generate the native Android project
        script: npx expo prebuild --platform android --no-install
      - name: Build debug APK
        script: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug
    artifacts:
      - mobile/android/app/build/outputs/apk/debug/*.apk

  # ── Android release — signed .aab for Google Play ─────────────────────────
  android-release:
    name: Android release (Google Play)
    # Same as android-preview: the free plan includes mac_mini_m2, not Linux.
    instance_type: mac_mini_m2
    max_build_duration: 60
    working_directory: mobile
    environment:
      android_signing:
        - kma_keystore
      node: 20.18.1
      java: 17
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Generate the native Android project
        script: npx expo prebuild --platform android --no-install
      - name: Point Gradle at the CI keystore
        script: |
          cat >> android/gradle.properties <<EOF
          MYAPP_UPLOAD_STORE_FILE=$CM_KEYSTORE_PATH
          MYAPP_UPLOAD_STORE_PASSWORD=$CM_KEYSTORE_PASSWORD
          MYAPP_UPLOAD_KEY_ALIAS=$CM_KEY_ALIAS
          MYAPP_UPLOAD_KEY_PASSWORD=$CM_KEY_PASSWORD
          EOF
          cat >> android/app/build.gradle <<'EOF'
          android {
              signingConfigs {
                  release {
                      storeFile file(MYAPP_UPLOAD_STORE_FILE)
                      storePassword MYAPP_UPLOAD_STORE_PASSWORD
                      keyAlias MYAPP_UPLOAD_KEY_ALIAS
                      keyPassword MYAPP_UPLOAD_KEY_PASSWORD
                  }
              }
              buildTypes {
                  release {
                      signingConfig signingConfigs.release
                  }
              }
          }
          EOF
      - name: Build release bundle
        script: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease
    artifacts:
      - mobile/android/app/build/outputs/bundle/release/*.aab

  # ── iOS release — signed .ipa for TestFlight / App Store ──────────────────
  ios-release:
    name: iOS release (TestFlight)
    instance_type: mac_mini_m2
    max_build_duration: 90
    working_directory: mobile
    integrations:
      app_store_connect: kma-appstore
    environment:
      node: 20.18.1
      xcode: latest
      cocoapods: default
      vars:
        BUNDLE_ID: org.kingstonmosque.app
    scripts:
      - name: Install dependencies
        script: npm ci
      - name: Generate the native iOS project
        script: npx expo prebuild --platform ios --no-install
      - name: Install CocoaPods
        script: |
          cd ios
          pod install
      - name: Set up code signing
        script: |
          keychain initialize
          app-store-connect fetch-signing-files "$BUNDLE_ID" --type IOS_APP_STORE --create
          keychain add-certificates
          xcode-project use-profiles
      - name: Build the .ipa
        script: |
          # Expo prebuild names the app scheme after the workspace. Deriving it
          # from the workspace filename avoids picking up Pod schemes (the
          # workspace's scheme list starts with libraries like "boost").
          WORKSPACE=$(find ios -maxdepth 1 -name "*.xcworkspace" | head -1)
          SCHEME=$(basename "$WORKSPACE" .xcworkspace)
          echo "Building workspace=$WORKSPACE scheme=$SCHEME"
          xcode-project build-ipa --workspace "$WORKSPACE" --scheme "$SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
